name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          command_timeout: 30m
          script: |
            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on the server for deploys"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on the server for deploys"
              exit 1
            fi
            APP_DIR=/opt/teamchat REPO_URL=https://github.com/EisenDev/TerminalChatSystem.git BRANCH=main GHCR_USERNAME="$GHCR_USERNAME" GHCR_TOKEN="$GHCR_TOKEN" bash -lc '
              set -eu
              if [ ! -d "$APP_DIR/.git" ]; then
                sudo mkdir -p /opt
                sudo rm -rf "$APP_DIR"
                sudo git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
                sudo chown -R "$USER:$USER" "$APP_DIR"
              fi
              cd "$APP_DIR"
              chmod +x scripts/deploy-prod.sh
              ./scripts/deploy-prod.sh
            '
