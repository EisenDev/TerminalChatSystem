name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            sudo apt-get update
            sudo apt-get install -y git
            rm -rf /tmp/teamchat-deploy
            git clone --depth 1 --branch main https://github.com/EisenDev/TerminalChatSystem.git /tmp/teamchat-deploy
            chmod +x /tmp/teamchat-deploy/scripts/deploy-prod.sh
            APP_DIR=/opt/teamchat REPO_URL=https://github.com/EisenDev/TerminalChatSystem.git BRANCH=main /tmp/teamchat-deploy/scripts/deploy-prod.sh
