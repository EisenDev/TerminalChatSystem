version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: teamchat
      POSTGRES_USER: teamchat
      POSTGRES_PASSWORD: teamchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
